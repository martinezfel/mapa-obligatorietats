<title>Mapa d'obligatorietats municipals — CASM</title>
<style>
  :root {
    --bg: #FFFFFF;
    --text: #1A1A1A;
    --text-body: #333333;
    --text-meta: #707070;
    --border: #D7DCE0;
    --accent: #935580;
    --accent-soft: #F5EFF2;
    --bloc-im: #6A8D8E;
    --bloc-im-soft: #EDF2F2;
    --pendent: #9D9D9D;
    --pendent-bg: #F3F3F3;
    --focus: #935580;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text-body);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    font-size: 18px;
  }
  body { padding-bottom: 4rem; }
  a { color: var(--accent); }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 0 1.25rem; }
  svg.icon { width: 14px; height: 14px; flex-shrink: 0; vertical-align: -2px; }

  header.top { padding: 1.75rem 0 0; }
  header.top h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 0.4rem; color: var(--text); letter-spacing: -0.01em; }
  header.top p.subtitle { margin: 0; color: var(--text-meta); font-size: 0.92rem; line-height: 1.5; width: 100%; }

  .view-nav { display: flex; gap: 1.25rem; flex-wrap: wrap; margin-bottom: 0.8rem; }
  .view-nav button.nav-link {
    display: inline-flex; align-items: center; gap: 0.35rem; font-family: inherit; font-size: 0.8rem;
    color: var(--text-body); background: none; border: none; padding: 0; cursor: pointer;
  }
  .view-nav button.nav-link:hover { color: var(--accent); }
  .view-nav button.nav-link svg { width: 15px; height: 15px; flex-shrink: 0; color: var(--accent); }

  .entrada { margin-top: 1.8rem; display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; }
  .entrada-card { border: 1px solid var(--border); border-radius: 8px; padding: 1.1rem 1.1rem 1.2rem; text-align: left; background: #fff; cursor: pointer; font-family: inherit; }
  .entrada-card .card-icon { margin-bottom: 0.6rem; }
  .entrada-card .card-icon svg { width: 26px; height: 26px; }
  .entrada-card h3 { margin: 0 0 0.35rem; font-size: 1rem; color: var(--text); }
  .entrada-card p { margin: 0; font-size: 0.82rem; color: var(--text-meta); line-height: 1.5; }
  @media (max-width: 560px) { .entrada { grid-template-columns: 1fr; } }

  .municipi-search-block { margin-top: 1.2rem; }
  .search-heading { font-size: 1rem; font-weight: 700; color: var(--text); margin: 0 0 0.7rem; }
  .municipi-search-block .field { margin-bottom: 1.6rem; }
  .field { position: relative; flex: 1 1 220px; }
  input[type="text"], select {
    width: 100%; font-family: inherit; font-size: 0.88rem; padding: 0.55rem 0.7rem;
    border: 1px solid var(--border); border-radius: 4px; background: #fff; color: var(--text);
  }
  input[type="text"]:focus, select:focus, button:focus-visible { outline: 2px solid var(--focus); outline-offset: 1px; }
  label.field-label { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.03em; color: var(--text-meta); margin-bottom: 0.3rem; }
  #municipi-suggestions {
    position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid var(--border);
    border-top: none; border-radius: 0 0 4px 4px; max-height: 220px; overflow-y: auto; z-index: 30; display: none;
  }
  #municipi-suggestions button {
    display: block; width: 100%; text-align: left; background: none; border: none; padding: 0.5rem 0.7rem;
    font-size: 0.85rem; cursor: pointer; font-family: inherit; color: var(--text-body);
  }
  #municipi-suggestions button:hover, #municipi-suggestions button:focus { background: var(--accent-soft); }

  .controls { position: sticky; top: 0; background: var(--bg); padding: 0.9rem 0; z-index: 20; border-bottom: 1px solid var(--border); }

  .municipi-context { padding: 0.65rem 0.8rem; background: #FAFAFA; border: 1px solid var(--border); border-radius: 6px; }
  @keyframes flashHighlight { 0% { background-color: var(--accent-soft); } 100% { background-color: #FAFAFA; } }
  .municipi-context.flash { animation: flashHighlight 1s ease-out; }
  .municipi-context .top-row { display: flex; align-items: center; justify-content: space-between; gap: 0.6rem; flex-wrap: wrap; }
  .municipi-context .name { font-size: 0.84rem; color: var(--text-body); }
  .municipi-context .name strong { color: var(--text); }
  .municipi-context .explain { font-size: 0.76rem; color: var(--text-meta); margin: 0.5rem 0 0; }
  .download-btn {
    display: inline-flex; align-items: center; gap: 0.4rem; font-family: inherit; font-size: 0.8rem;
    color: #fff; background: var(--accent); border: none; border-radius: 4px; padding: 0.5rem 0.85rem;
    text-decoration: none; margin-top: 0.7rem; cursor: pointer;
  }
  .download-btn:hover { opacity: 0.92; }
  .download-btn svg { width: 14px; height: 14px; }

  .type-toggles { display: flex; border: 1px solid var(--border); border-radius: 100px; overflow: hidden; margin-top: 1.3rem; width: fit-content; }
  .type-seg-btn { display: inline-flex; align-items: center; gap: 0.35rem; font-family: inherit; font-size: 0.8rem; padding: 0.42rem 0.9rem; border: none; background: #fff; color: var(--text-meta); cursor: pointer; }
  .type-seg-btn:not(:last-child) { border-right: 1px solid var(--border); }
  .type-seg-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
  .type-seg-btn.active[data-key="obligatori"] { background: var(--accent); color: #fff; }
  .type-seg-btn.active[data-key="interes_municipal"] { background: var(--bloc-im); color: #fff; }
  .type-seg-btn.active[data-key="tots"] { background: var(--text-body); color: #fff; }

  details.filtre-panel { margin-top: 0.85rem; border: 1px solid var(--border); border-radius: 6px; }
  details.filtre-panel > summary { list-style: none; cursor: pointer; padding: 0.65rem 0.9rem; display: flex; justify-content: space-between; align-items: center; font-size: 0.82rem; color: var(--text-body); }
  details.filtre-panel > summary::-webkit-details-marker { display: none; }
  details.filtre-panel > summary .filtre-count { color: var(--text-meta); }
  details.filtre-panel > summary .chev { color: var(--text-meta); transition: transform .15s ease; }
  details.filtre-panel[open] > summary .chev { transform: rotate(90deg); }
  .filtre-panel-body { padding: 0 0.9rem 0.8rem; border-top: 1px solid var(--border); }
  .search-filter-row { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 0.7rem; }

  main { padding-top: 1.3rem; }

  details.ambit { border: 1px solid var(--border); border-radius: 6px; margin-bottom: 0.6rem; overflow: hidden; }
  details.ambit > summary { list-style: none; cursor: pointer; padding: 0.7rem 0.9rem; font-weight: 700; font-size: 0.92rem; color: var(--text); background: #FAFAFA; display: flex; justify-content: space-between; align-items: center; }
  details.ambit > summary::-webkit-details-marker { display: none; }
  details.ambit > summary .count { font-weight: 400; color: var(--text-meta); font-size: 0.78rem; }
  details.ambit > summary .count-fetes { font-weight: 600; color: var(--accent); font-size: 0.72rem; margin-left: 0.3rem; }
  details.ambit > summary .chev { transition: transform 0.15s ease; color: var(--text-meta); margin-left: 0.5rem; }
  details.ambit[open] > summary .chev { transform: rotate(90deg); }

  .servei-list { border-top: 1px solid var(--border); }
  .pendents-summary {
    padding: 0.6rem 0.9rem;
    font-size: 0.78rem;
    color: var(--text-meta);
    background: var(--pendent-bg);
    line-height: 1.6;
  }
  .pendents-summary strong { color: var(--text-body); font-weight: 600; }
  details.servei { border-bottom: 1px solid var(--border); }
  details.servei:last-child { border-bottom: none; }
  details.servei > summary { list-style: none; cursor: pointer; padding: 0.7rem 0.9rem; display: flex; gap: 0.7rem; align-items: flex-start; justify-content: space-between; }
  details.servei > summary::-webkit-details-marker { display: none; }
  details.servei.pendent > summary { background: var(--pendent-bg); }
  .servei-name-wrap { flex: 1; min-width: 0; }
  .tipus-tag { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.7rem; font-weight: 700; padding: 0.12rem 0.5rem 0.12rem 0.4rem; border-radius: 100px; margin-bottom: 0.3rem; }
  .tipus-tag.obligatori { background: var(--accent-soft); color: var(--accent); }
  .tipus-tag .tram-part { font-weight: 400; }
  .tipus-tag.interes { background: var(--bloc-im-soft); color: var(--bloc-im); }
  .servei-name { display: block; font-size: 0.9rem; font-weight: 600; color: var(--text); }
  .servei-resum { font-size: 0.82rem; color: var(--text-meta); margin: 0.3rem 0 0; line-height: 1.45; }
  .badges { display: flex; gap: 0.35rem; flex-wrap: wrap; flex-shrink: 0; align-items: center; }

  .badge.pendent { background: #EFEFEF; color: var(--pendent); border-color: transparent; }
  details.servei > summary .chev { color: var(--text-meta); margin-top: 0.15rem; transition: transform 0.15s ease; }
  details.servei[open] > summary .chev { transform: rotate(90deg); }
  .expand-label {
    display: inline-block; font-family: inherit; font-size: 0.76rem; color: var(--accent);

  details.servei > summary:hover .expand-label { background: var(--accent-soft); }
  .expand-label .label-open { display: none; }
  details.servei[open] > summary .expand-label .label-closed { display: none; }
  details.servei[open] > summary .expand-label .label-open { display: inline; }

  .servei-detail { padding: 0 0.9rem 1rem; }
  .checklist-intro { font-size: 0.8rem; color: var(--text-meta); margin: 0.3rem 0 0.6rem; }
  .checklist-group-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.03em; color: var(--text-meta); font-weight: 700; margin: 0.9rem 0 0.4rem; }

  details.check-item { border-top: 1px solid var(--border); }

  details.check-item > summary { list-style: none; cursor: pointer; display: flex; gap: 0.6rem; padding: 0.55rem 0; align-items: flex-start; }
  details.check-item > summary::-webkit-details-marker { display: none; }
  .check-icon { flex-shrink: 0; color: var(--text-meta); padding-top: 0.1rem; }
  .check-content { flex: 1; }
  .check-question { font-size: 0.86rem; color: var(--text-body); margin: 0 0 0.2rem; line-height: 1.5; }

  .check-cita { font-size: 0.74rem; color: var(--accent); }
  .check-toggle-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 15px; height: 15px; border: 1px solid var(--accent); border-radius: 50%;
    color: var(--accent); font-size: 0.72rem; line-height: 1; flex-shrink: 0;
  }
  .check-toggle-icon .icon-minus { display: none; }
  details.check-item[open] .check-toggle-icon .icon-plus { display: none; }
  details.check-item[open] .check-toggle-icon .icon-minus { display: inline; }
  .check-item-detail { padding: 0 0 0.7rem 1.9rem; font-size: 0.8rem; line-height: 1.55; color: var(--text-body); font-style: italic; }

  .servei-meta-row { display: flex; gap: 1.5rem; flex-wrap: wrap; font-size: 0.78rem; color: var(--text-meta); margin: 0.9rem 0 0.7rem; }
  .servei-meta-row span strong { color: var(--text-body); font-weight: 600; }

  .legal-toggle { font-family: inherit; font-size: 0.78rem; color: var(--accent); background: none; border: 1px solid var(--border); border-radius: 100px; padding: 0.35rem 0.75rem; cursor: pointer; }
  .legal-toggle:hover { background: var(--accent-soft); }
  .legal-box { margin-top: 0.7rem; padding: 0.75rem 0.9rem; background: #FAFAFA; border: 1px solid var(--border); border-radius: 6px; display: none; }
  .legal-box.open { display: block; }
  .legal-box ul { margin: 0; padding-left: 1.1rem; font-size: 0.82rem; line-height: 1.7; color: var(--text-body); }

  .pendent-note { font-size: 0.82rem; color: var(--text-meta); font-style: italic; margin: 0.3rem 0 0; }
  .empty-state { padding: 2rem 0; text-align: center; color: var(--text-meta); font-size: 0.88rem; }

  footer.site { margin-top: 3rem; padding-top: 1.2rem; border-top: 1px solid var(--border); font-size: 0.76rem; color: var(--text-meta); line-height: 1.6; }
  footer.site p { margin: 0 0 0.4rem; }

  @media (max-width: 560px) {
    .search-filter-row { flex-direction: column; }
  }
</style>
</head>

</div>

const SERVEIS = [{"id": "enllumenat-public", "nom": "Enllumenat públic", "bloc": "obligatori", "ambit": "Benestar comunitari", "tram_base": null, "font_star": false, "estat": "pendent", "resum": null, "competencia": null, "normativa_mare": [], "checklist": [], "data_actualitzacio": null}, {"id": "cementiri", "nom": "Cementiri", "bloc": "obligatori", "ambit": "Benestar comunitari", "tram_base": null, "font_star": false, "estat": "validat", "resum": "El municipi ha de garantir el servei de cementiri, propi o compartit amb altres municipis, amb les condicions sanitàries i funcionals mínimes, i és també l’administració competent en matèria de serveis funeraris, responsable de garantir-ne l’existència i la prestació a tota la col·lectivitat.", "competencia": "propia", "normativa_mare": ["Llei 7/1985, de 2 d'abril, reguladora de les bases del règim local", "Decret legislatiu 2/2003, de 28 d'abril, pel qual s'aprova el Text refós de la Llei municipal i de règim local de Catalunya"], "checklist": [{"pregunta": "El municipi garanteix el servei de cementiri, propi o associat?", "llei_nom": "Decret 297/1997, de 25 de novembre, pel qual s'aprova el Reglament de policia sanitària mortuòria de Catalunya", "article": "art. 38", "explicacio": "Tots els municipis, independentment o associats, han de prestar el servei de cementiri.", "llindar_label": "Tots els municipis", "pob_min": null, "pob_min_strict": true, "pob_max": null, "pob_max_strict": true}, {"pregunta": "El cementiri disposa dels elements mínims exigibles (sepultures suficients, dipòsit de cadàvers, ossera general, instal·lacions d'aigua, serveis higiènics i llibre-registre d'inhumacions i exhumacions)?", "llei_nom": "Decret 297/1997, de 25 de novembre, pel qual s'aprova el Reglament de policia sanitària mortuòria de Catalunya", "article": "art. 46", "explicacio": "Els cementiris han de disposar necessàriament, a més del nombre corresponent de sepultures, de les instal·lacions següents: dipòsit de cadàvers, ossera general, instal·lacions d'aigua i serveis higiènics. Cada cementiri ha de portar un llibre-registre on s'anotaran totes les inhumacions i les exhumacions que es realitzin.", "llindar_label": "Tots els municipis", "pob_min": null, "pob_min_strict": true, "pob_max": null, "pob_max_strict": true}, {"pregunta": "Està garantit l'accés als serveis funeraris al municipi?", "llei_nom": "Llei 2/1997, de 3 d'abril, sobre serveis funeraris", "article": "art. 1 i 2", "explicacio": "Els serveis funeraris tenen la condició de servei essencial d’interès general. Els municipis són l’administració competent en matèria de serveis funeraris i són els responsables de garantir-ne l’existència i la prestació a tota la col·lectivitat local.", "llindar_label": "Tots els municipis", "pob_min": null, "pob_min_strict": true, "pob_max": null, "pob_max_strict": true}, {"pregunta": "Està identificat qui presta i qui gestiona els serveis funeraris del municipi, i sota quin règim d'autorització operen?", "llei_nom": "Llei 2/1997, de 3 d'abril, sobre serveis funeraris", "article": "art. 1, 2 i 7", "explicacio": "Els serveis funeraris poden ésser prestats per l’Administració, per empreses públiques o per empreses privades, en règim de concurrència en tots els casos. Els serveis funeraris poden ésser gestionats pels ajuntaments o per empreses privades.", "llindar_label": "Tots els municipis", "pob_min": null, "pob_min_strict": true, "pob_max": null, "pob_max_strict": true}], "data_actualitzacio": "2026-07-01"}, {"id": "recollida-residus", "nom": "Recollida de residus", "bloc": "obligatori", "ambit": "Benestar comunitari", "tram_base": null, "font_star": false, "estat": "pendent", "resum": null, "competencia": null, "normativa_mare": [], "checklist": [], "data_actualitzacio": null}, {"id": "neteja-viaria", "nom": "Neteja viària", "bloc": "obligatori", "ambit": "Benestar comunitari", "tram_base": null, "font_star": false, "estat": "pendent", "resum": null, "competencia": null, "normativa_mare": [], "checklist": [], "data_actualitzacio": null}, {"id": "abastament-aigua", "nom": "Abastament domiciliari d'aigua potable", "bloc": "obligatori", "ambit": "Benestar comunitari", "tram_base": null, "font_star": false, "estat": "validat", "resum": "Cal garantir el subministrament d'aigua potable apta per al consum, amb els controls sanitaris i la vigilància que estableix la normativa.", "competencia": "propia", "normativa_mare": ["Llei 7/1985, de 2 d'abril, reguladora de les bases del règim local"], "checklist": [{"pregunta": "L'ajuntament té definides les actuacions necessàries per controlar els riscos per a la salut relacionats amb l'aigua de consum?", "llei_nom": "Llei 18/2009, del 22 d'octubre, de salut pública", "article": "art. 52.c i 53.1", "explicacio": "Els ajuntaments són competents per prestar, com a servei mínim en matèria de salut pública, la gestió del risc per a la salut pel que fa a les aigües de consum públic. Els ens locals poden prestar els serveis mínims de salut pública directament o per qualsevol de les formes de gestió establertes per la legislació de règim local.", "llindar_label": "Tots els municipis", "pob_min": null, "pob_min_strict": true, "pob_max": null, "pob_max_strict": true}, {"pregunta": "Com es gestiona el subministrament d'aigua de consum: de manera directa, indirecta, delegada o mixta?", "llei_nom": "Reial decret 3/2023, de 10 de gener, pel qual s'estableixen els criteris tecnicosanitaris de la qualitat de l'aigua de consum, el seu control i subministrament", "article": "art. 4.1 i 4.2", "explicacio": "Quan la gestió del subministrament de l'aigua de consum sigui directa, l'administració local haurà de realitzar les actuacions que estableix la norma, sens perjudici de les que corresponen a l'autoritat sanitària. Quan la gestió sigui indirecta, delegada o mixta, l'administració local haurà de garantir que els operadors titulars de la concessió compleixin les obligacions que els corresponen.", "llindar_label": "Tots els municipis", "pob_min": null, "pob_min_strict": true, "pob_max": null, "pob_max_strict": true}, {"pregunta": "Es garanteix que l'aigua subministrada és apta per al consum i que compleix els requisits de qualitat fins al punt de lliurament?", "llei_nom": "Reial decret 3/2023, de 10 de gener, pel qual s'estableixen els criteris tecnicosanitaris de la qualitat de l'aigua de consum, el seu control i subministrament", "article": "art. 4.1.a i e; art. 4.2.b i d", "explicacio": "En gestió directa, l'administració local haurà de realitzar el tractament de potabilització oportú per assegurar que l'aigua subministrada sigui apta per al consum en el punt de lliurament a l'usuari i garantir que la qualitat de l'aigua de consum compleixi el que disposa l'annex I. En gestió indirecta, delegada o mixta, haurà de garantir que els operadors subministrin aigua apta per al consum i garanteixin la qualitat de l'aigua fins al punt de lliurament.", "llindar_label": "Tots els municipis", "pob_min": null, "pob_min_strict": true, "pob_max": null, "pob_max_strict": true}, {"pregunta": "El servei disposa dels instruments de control exigits per la normativa, com el Protocol d'Autocontrol i el Pla Sanitari de l'Aigua?", "llei_nom": "Reial decret 3/2023, de 10 de gener, pel qual s'estableixen els criteris tecnicosanitaris de la qualitat de l'aigua de consum, el seu control i subministrament", "article": "art. 4.1.b i c; art. 4.2.c i e", "explicacio": "En gestió directa, l'administració local haurà de realitzar el Protocol d'Autocontrol i la vigilància municipal en les infraestructures de titularitat i gestió municipal, i el Pla Sanitari de l'Aigua en les zones d'abastament de titularitat i gestió municipal. En gestió indirecta, delegada o mixta, haurà de garantir que els operadors compleixin la freqüència de mostreig del Protocol d'Autocontrol i realitzin i implantin els Plans Sanitaris de l'Aigua en les zones d'abastament i la proposta de mesures correctores.", "llindar_label": "Tots els municipis", "pob_min": null, "pob_min_strict": true, "pob_max": null, "pob_max_strict": true}, {"pregunta": "L'ajuntament realitza la vigilància municipal de la qualitat de l'aigua a l'aixeta de l'usuari?", "llei_nom": "Reial decret 3/2023, de 10 de gener, pel qual s'estableixen els criteris tecnicosanitaris de la qualitat de l'aigua de consum, el seu control i subministrament", "article": "art. 13.1.b", "explicacio": "Vigilància municipal: realitzada per l'administració local, a l'aixeta de l'usuari.", "llindar_label": "Tots els municipis", "pob_min": null, "pob_min_strict": true, "pob_max": null, "pob_max_strict": true}, {"pregunta": "S'han avaluat les fuites estructurals de les xarxes de distribució i les escomeses?", "llei_nom": "Reial decret 3/2023, de 10 de gener, pel qual s'estableixen els criteris tecnicosanitaris de la qualitat de l'aigua de consum, el seu control i subministrament", "article": "art. 4.1.d i 4.2.f", "explicacio": "En gestió directa, l'administració local haurà de realitzar l'avaluació de fuites estructurals en les xarxes de distribució i escomeses de titularitat i gestió municipal. En gestió indirecta, delegada o mixta, haurà de garantir que els operadors realitzin l'avaluació de fuites estructurals en les xarxes de distribució i escomeses.", "llindar_label": "Tots els municipis", "pob_min": null, "pob_min_strict": true, "pob_max": null, "pob_max_strict": true}, {"pregunta": "La informació sobre el servei i la qualitat de l'aigua està publicada en línia i notificada al SINAC?", "llei_nom": "Reial decret 3/2023, de 10 de gener, pel qual s'estableixen els criteris tecnicosanitaris de la qualitat de l'aigua de consum, el seu control i subministrament", "article": "art. 63.2", "explicacio": "L'administració local i el responsable legal, independentment de si la gestió és directa, indirecta, delegada o mixta, publicaran almenys en línia la informació que assenyala el punt 1 de la part B.1 de l'annex XI abans de les 72 hores de disposar dels informes analítics i notificaran l' const ICON_OBLIGATORI = '<svg class="icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 1.3L13.5 3.3V7.3C13.5 10.8 11.2 13.1 8 14.6C4.8 13.1 2.5 10.8 2.5 7.3V3.3L8 1.3Z" fill="currentColor"/></svg>';
const ICON_INTERES = '<svg class="icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="6.8" stroke="currentColor" stroke-width="1.4"/><path d="M5 8.2L7 10.2L11 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const ICON_QUESTION = '<svg class="icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="8" r="6.8" stroke="currentColor" stroke-width="1.4" fill="none"/><text x="8" y="11" text-anchor="middle" font-size="8.5" font-family="Helvetica, Arial, sans-serif" font-weight="bold" fill="currentColor">?</text></svg>';
const ICON_DOWNLOAD = '<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M8 2V10.5M8 10.5L4.8 7.3M8 10.5L11.2 7.3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M2.5 12.5V13.2C2.5 13.6 2.8 14 3.3 14H12.7C13.1 14 13.5 13.6 13.5 13.2V12.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>';
const ICON_MUNICIPI_LARGE = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="color:var(--accent)"><path d="M4 21V9L12 3L20 9V21" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M9 21V13H15V21" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>';
const ICON_EXPLORA_LARGE = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="color:var(--text-meta)"><rect x="3.5" y="3.5" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6"/><rect x="13.5" y="3.5" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6"/><rect x="3.5" y="13.5" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6"/><rect x="13.5" y="13.5" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.6"/></svg>';
const ICON_MUNICIPI_NAV = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 21V9L12 3L20 9V21" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 21V13H15V21" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>';
const ICON_EXPLORA_NAV = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3.5" y="3.5" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/><rect x="13.5" y="3.5" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/><rect x="3.5" y="13.5" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/><rect x="13.5" y="13.5" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/></svg>';
const ICON_HOME_NAV = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 11L12 4L20 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 9.5V20H18V9.5" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M10 20V14H14V20" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>';

let state = {
  view: "entrada",             // entrada | cercaMunicipi | municipi | explora
  municipi: null,
  tipusFiltre: "tots",          // tots | obligatori | interes_municipal — only used in explora view
  search: "",
  ambit: "tots",
  justCleared: false,
};

function normalize(str) {
  return (str || "").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function tramLabel(servei) {
  if (servei.tram_base == null) return t("tram_tots");
  return t("tram_mes_de", { n: servei.tram_base.toLocaleString("ca-ES") });
}

function serveiApplies(servei, poblacio) {
  if (servei.tram_base == null) return true;
  return poblacio > servei.tram_base;
}

function itemApplies(itm, poblacio) {
  if (itm.pob_min != null) {
    if (itm.pob_min_strict ? !(poblacio > itm.pob_min) : !(poblacio >= itm.pob_min)) return false;
  }
  if (itm.pob_max != null) {
    if (itm.pob_max_strict ? !(poblacio < itm.pob_max) : !(poblacio <= itm.pob_max)) return false;
  }
  return true;
}

// Card-level inclusion in municipi view: if the fitxa has a validated checklist, use its
// per-item thresholds (more precise, can include obligations below the headline tram_base,
// e.g. comarcal support for libraries under 5.000 hab.). Fitxes pendents fall back to tram_base.
function cardAppliesForMunicipi(servei, poblacio) {
  if (servei.checklist && servei.checklist.length) {
    return servei.checklist.some(it => itemApplies(it, poblacio));
  }
  return serveiApplies(servei, poblacio);
}

function lleiLink(nom, textVisible) {
  const url = LLEIS[nom];
  const label = textVisible || nom;
  if (url) {
    return '<a href="' + url + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">' + label + '</a>';
  }
  return label;
}

function staticText() {
  document.getElementById("app-title").textContent = t("titol");
  document.getElementById("app-subtitle").textContent = t("subtitol");
  document.getElementById("municipi-input").placeholder = t("municipi_input_placeholder");
  document.getElementById("municipi-input-label").textContent = t("municipi_placeholder");
  document.getElementById("btn-torna-inici-1").innerHTML = ICON_HOME_NAV + '<span>' + t("torna_inici") + '</span>';
  document.getElementById("search-input").placeholder = t("cerca_placeholder");
  document.getElementById("filtre-panel-title").textContent = t("cerca_filtra_titol");
  const ambitsAmbContingut = AMBIT_ORDER.filter(a => SERVEIS.some(sv => sv.ambit === a));
  document.getElementById("ambit-select").innerHTML = '<option value="tots">' + t("ambit_select_default") + '</option>' +
    ambitsAmbContingut.map(a => '<option value="' + a + '">' + a + '</option>').join("");
  document.getElementById("app-footer").innerHTML =
    '<p>' + t("avis_revisio") + '</p><p>' + t("avis_general") + '</p><p>' + t("avis_organitzacio") + '</p>';
}

function renderEntrada() {
  const el = document.getElementById("entrada-screen");
  el.innerHTML =
    '<button type="button" class="entrada-card" id="entrada-municipi">' +
      '<div class="card-icon">' + ICON_MUNICIPI_LARGE + '</div>' +
      '<h3>' + t("entrada_opcio_municipi_titol") + '</h3><p>' + t("entrada_opcio_municipi_desc") + '</p>' +
    '</button>' +
    '<button type="button" class="entrada-card" id="entrada-explora">' +
      '<div class="card-icon">' + ICON_EXPLORA_LARGE + '</div>' +
      '<h3>' + t("entrada_opcio_explora_titol") + '</h3><p>' + t("entrada_opcio_explora_desc") + '</p>' +
    '</button>';
  document.getElementById("entrada-municipi").addEventListener("click", () => setView("cercaMunicipi"));
  document.getElementById("entrada-explora").addEventListener("click", () => setView("explora"));
}

function setView(view) {
  state.view = view;
  if (view === "explora") { state.tipusFiltre = "tots"; }
  updateVisibility();
}

function updateVisibility() {
  document.getElementById("entrada-screen").style.display = state.view === "entrada" ? "grid" : "none";
  document.getElementById("municipi-search-block").style.display = (state.view === "cercaMunicipi") ? "block" : "none";
  document.getElementById("app-controls").style.display = (state.view === "municipi" || state.view === "explora") ? "block" : "none";
  document.getElementById("app").style.display = (state.view === "municipi" || state.view === "explora") ? "block" : "none";

  document.getElementById("municipi-context").style.display = (state.view === "municipi") ? "block" : "none";
  document.getElementById("explora-context").style.display = (state.view === "explora") ? "block" : "none";

  if (state.view === "municipi" || state.view === "explora") renderViewNav();
  if (state.view === "municipi") renderMunicipiContext();
  if (state.view === "explora") renderExploraContext();
  if (state.view === "municipi" || state.view === "explora") render();
}

function renderViewNav() {
  const nav = document.getElementById("view-nav");
  if (state.view === "municipi") {
    nav.innerHTML =
      '<button type="button" class="nav-link" id="nav-altre-municipi">' + ICON_MUNICIPI_NAV + '<span>' + t("municipi_consulta_altre") + '</span></button>' +
      '<button type="button" class="nav-link" id="nav-explora">' + ICON_EXPLORA_NAV + '<span>' + t("municipi_explora_tot") + '</span></button>' +
      '<button type="button" class="nav-link" id="nav-inici">' + ICON_HOME_NAV + '<span>' + t("torna_inici") + '</span></button>';
    nav.querySelector("#nav-altre-municipi").addEventListener("click", () => setView("cercaMunicipi"));
    nav.querySelector("#nav-explora").addEventListener("click", () => { state.municipi = null; state.justCleared = true; setView("explora"); });
    nav.querySelector("#nav-inici").addEventListener("click", () => setView("entrada"));
  } else {
    nav.innerHTML =
      '<button type="button" class="nav-link" id="nav-municipi">' + ICON_MUNICIPI_NAV + '<span>' + t("municipi_canviar_des_explora") + '</span></button>' +
      '<button type="button" class="nav-link" id="nav-inici">' + ICON_HOME_NAV + '<span>' + t("torna_inici") + '</span></button>';
    nav.querySelector("#nav-municipi").addEventListener("click", () => setView("cercaMunicipi"));
    nav.querySelector("#nav-inici").addEventListener("click", () => setView("entrada"));
  }
}

function renderExploraContext() {
  const ctx = document.getElementById("explora-context");
  ctx.innerHTML =
    '<div class="top-row"><span class="name"><strong>' + t("explora_titol") + '</strong></span></div>' +
    '<p class="explain">' + t("explora_explicacio") + '</p>' +
    '<a class="download-btn" href="informes/tots-els-serveis.pdf" download>' + ICON_DOWNLOAD + t("descarrega_pdf_tots") + '</a>' +
    '<div class="type-toggles" id="type-toggles"></div>';
  renderTypeToggles();
  if (state.justCleared) {
    ctx.classList.add("flash");
    state.justCleared = false;
  } else {
    ctx.classList.remove("flash");
  }
}
function renderTypeToggles() {
  const wrap = document.getElementById("type-toggles");
  const options = [
    { key: "tots", label: t("tipus_tots"), icon: "" },
    { key: "obligatori", label: t("filtre_obligatoris_label"), icon: ICON_OBLIGATORI },
    { key: "interes_municipal", label: t("filtre_interes_label"), icon: ICON_INTERES },
  ];
  wrap.innerHTML = options.map(o =>
    '<button type="button" class="type-seg-btn' + (state.tipusFiltre === o.key ? " active" : "") + '" data-key="' + o.key + '">' + o.icon + '<span>' + o.label + '</span></button>'
  ).join("");
  wrap.querySelectorAll(".type-seg-btn").forEach(btn => {
    btn.addEventListener("click", () => { state.tipusFiltre = btn.dataset.key; renderTypeToggles(); render(); });
  });
}

function renderMunicipiContext() {
  const ctx = document.getElementById("municipi-context");
  const m = state.municipi;
  if (!m) return;
  const pdfHref = "informes/" + m.codi_ine + ".pdf";
  ctx.innerHTML =
    '<div class="top-row"><span class="name">' + t("municipi_seleccionat_prefix") + ' <strong>' + m.nom + '</strong> (' + m.poblacio.toLocaleString("ca-ES") + ' hab., ' + m.comarca + ')</span></div>' +
    '<p class="explain">' + t("municipi_explicacio") + '</p>' +
    '<a class="download-btn" href="' + pdfHref + '" download>' + ICON_DOWNLOAD + t("descarrega_pdf_municipi", { municipi: m.nom }) + '</a>';
}

function setupMunicipiSearch() {
  const input = document.getElementById("municipi-input");
  const box = document.getElementById("municipi-suggestions");
  input.addEventListener("input", () => {
    const q = normalize(input.value);
    box.innerHTML = "";
    if (q.length < 2) { box.style.display = "none"; return; }
    const matches = MUNICIPIS.filter(m => normalize(m.nom).includes(q)).slice(0, 12);
    if (!matches.length) { box.style.display = "none"; return; }
    matches.forEach(m => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = m.nom + " · " + m.poblacio.toLocaleString("ca-ES") + " hab. (" + m.comarca + ")";
      btn.addEventListener("click", () => selectMunicipi(m));
      box.appendChild(btn);
    });
    box.style.display = "block";
  });
  document.addEventListener("click", (e) => {
    if (!box.contains(e.target) && e.target !== input) box.style.display = "none";
  });
}

function selectMunicipi(m) {
  state.municipi = m;
  document.getElementById("municipi-input").value = "";
  document.getElementById("municipi-suggestions").style.display = "none";
  setView("municipi");
}

function setupTopLinks() {
  document.getElementById("btn-torna-inici-1").addEventListener("click", () => setView("entrada"));
}

function setupControls() {
  document.getElementById("search-input").addEventListener("input", (e) => { state.search = e.target.value; render(); });
  document.getElementById("ambit-select").addEventListener("change", (e) => { state.ambit = e.target.value; render(); });
}

function matchesSearch(servei, q) {
  if (!q) return true;
  const nq = normalize(q);
  if (normalize(servei.nom).includes(nq)) return true;
  if (servei.resum && normalize(servei.resum).includes(nq)) return true;
  if (servei.checklist && servei.checklist.some(it => normalize(it.pregunta).includes(nq) || normalize(it.llei_nom).includes(nq))) return true;
  return false;
}

function baseFilteredByView() {
  if (state.view === "municipi" && state.municipi) {
    return SERVEIS.filter(sv => sv.bloc === "obligatori" && cardAppliesForMunicipi(sv, state.municipi.poblacio));
  }
  if (state.view === "explora") {
    return SERVEIS.filter(sv => state.tipusFiltre === "tots" || sv.bloc === state.tipusFiltre);
  }
  return SERVEIS.slice();
}

function filteredServeis() {
  return baseFilteredByView().filter(sv => {
    if (state.ambit !== "tots" && sv.ambit !== state.ambit) return false;
    if (!matchesSearch(sv, state.search)) return false;
    return true;
  });
}

function groupSortKey(items) {
  const mins = items.map(it => it.pob_min).filter(v => v != null);
  const maxs = items.map(it => it.pob_max).filter(v => v != null);
  const anyBound = items.some(it => it.pob_min != null || it.pob_max != null);
  if (!anyBound) return [-1, -1];
  const min = mins.length ? Math.min(...mins) : 0;
  const max = maxs.length ? Math.min(...maxs) : Number.MAX_SAFE_INTEGER;
  return [min, max];
}

function groupedChecklist(sv) {
  const poblacio = (state.view === "municipi" && state.municipi) ? state.municipi.poblacio : null;
  const source = poblacio != null ? sv.checklist.filter(it => itemApplies(it, poblacio)) : sv.checklist;
  const groups = [];
  source.forEach(it => {
    let g = groups.find(g => g.label === it.llindar_label);
    if (!g) { g = { label: it.llindar_label, items: [] }; groups.push(g); }
    g.items.push(it);
  });
  groups.sort((a, b) => {
    const ka = groupSortKey(a.items), kb = groupSortKey(b.items);
    return ka[0] - kb[0] || ka[1] - kb[1];
  });
  return groups;
}

function serveiCard(sv) {
  const pendent = sv.estat !== "validat";
  const tramText = sv.bloc === "obligatori" ? ' <span class="tram-part">· ' + tramLabel(sv) + '</span>' : "";
  const tipusTag = sv.bloc === "obligatori"
    ? '<span class="tipus-tag obligatori">' + ICON_OBLIGATORI + t("distintiu_obligatori") + tramText + '</span>'
    : '<span class="tipus-tag interes">' + ICON_INTERES + t("distintiu_interes_municipal") + '</span>';

  let badges = "";
  if (pendent) badges += '<span class="badge pendent">' + t("badge_pendent") + '</span>';

  let body = "";
  if (pendent) {
    body = '<p class="pendent-note">' + t("pendent_nota") + '</p>';
  } else {
    const groups = groupedChecklist(sv);
    body += '<p class="checklist-intro">' + t("checklist_intro") + '</p>';
    groups.forEach(g => {
      if (g.label) body += '<p class="checklist-group-label">' + g.label + '</p>';
      g.items.forEach(it => {
        const refLine = lleiLink(it.llei_nom) + (it.article ? ", " + it.article : "");
        body += '<details class="check-item"><summary>' +
          '<span class="check-icon">' + ICON_QUESTION + '</span>' +
          '<div class="check-content"><p class="check-question">' + it.pregunta + '</p>' +
          '<span class="check-cita-row"><span class="check-cita">' + refLine + '</span><span class="check-toggle-icon"><span class="icon-plus">+</span><span class="icon-minus">&#8722;</span></span></span></div>' +
          '</summary>' +
          '<div class="check-item-detail">' + it.explicacio + '</div>' +
          '</details>';
      });
    });
    body += '<div class="servei-meta-row">';
    body += '<span><strong>' + t("meta_competencia_label") + '</strong> ' + capitalize(sv.competencia) + '</span>';
    body += '<span><strong>' + t("meta_actualitzacio_label") + '</strong> ' + formatDate(sv.data_actualitzacio) + '</span>';
    body += '</div>';

    const lleis = [];
    (sv.normativa_mare || []).forEach(l => { if (!lleis.includes(l)) lleis.push(l); });
    groups.forEach(g => g.items.forEach(it => { if (!lleis.includes(it.llei_nom)) lleis.push(it.llei_nom); }));
    body += '<button type="button" class="legal-toggle">' + t("normativa_mostra") + '</button>';
    body += '<div class="legal-box"><ul>' + lleis.map(l => '<li>' + lleiLink(l) + '</li>').join("") + '</ul></div>';
  }

  const expandLabel = pendent ? "" :
    '<span class="expand-label"><span class="label-closed">' + t("check_mostra_practica") + '</span><span class="label-open">' + t("check_amaga") + '</span></span>';

  const el = document.createElement("details");
  el.className = "servei" + (pendent ? " pendent" : "");
  el.innerHTML = '<summary><div class="servei-name-wrap">' + tipusTag +
    '<span class="servei-name">' + sv.nom + '</span>' +
    (sv.resum && !pendent ? '<p class="servei-resum">' + sv.resum + '</p>' : '') +
    expandLabel +
    '</div><div class="badges">' + badges + '<span class="chev">&#9656;</span></div></summary>' +
    '<div class="servei-detail">' + body + '</div>';

  if (!pendent) {
    const toggleBtn = el.querySelector(".legal-toggle");
    const legalBox = el.querySelector(".legal-box");
    toggleBtn.addEventListener("click", (e) => {
      e.preventDefault();
      legalBox.classList.toggle("open");
      toggleBtn.textContent = legalBox.classList.contains("open") ? t("normativa_amaga") : t("normativa_mostra");
    });
  }
  return el;
}

function capitalize(str) {
  if (!str) return "—";
  const map = { propia: "Pròpia", compartida: "Compartida", delegada: "Delegada", impropia: "Impròpia" };
  return map[str] || str;
}
function formatDate(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleDateString("ca-ES", { day: "numeric", month: "long", year: "numeric" });
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  const filtered = filteredServeis();
  const total = baseFilteredByView().length;

  document.getElementById("filtre-panel-count").textContent = t("comptador_resultats", { n: filtered.length, total: total });

  if (!filtered.length) {
    app.innerHTML = '<div class="empty-state">' + t("cap_resultat") + '</div>';
    return;
  }

  AMBIT_ORDER.forEach(ambit => {
    const ambitServeis = filtered.filter(sv => sv.ambit === ambit);
    if (!ambitServeis.length) return;
    const validats = ambitServeis.filter(sv => sv.estat === "validat").sort((a, b) => a.nom.localeCompare(b.nom, "ca"));
    const pendents = ambitServeis.filter(sv => sv.estat !== "validat").sort((a, b) => a.nom.localeCompare(b.nom, "ca"));
    const det = document.createElement("details");
    det.className = "ambit";
    det.open = false;
    const summary = document.createElement("summary");
    const fetesTag = validats.length ? '<span class="count-fetes">· ' + validats.length + ' ' + (validats.length === 1 ? "servei validat" : "serveis validats") + '</span>' : '';
    summary.innerHTML = '<span>' + ambit + ' <span class="count">(' + ambitServeis.length + ')</span>' + fetesTag + '</span><span class="chev">&#9656;</span>';
    det.appendChild(summary);
    const list = document.createElement("div");
    list.className = "servei-list";
    validats.forEach(sv => list.appendChild(serveiCard(sv)));
    if (pendents.length) {
      const p = document.createElement("div");
      p.className = "pendents-summary";
      const nom_serveis = pendents.length === 1 ? "servei" : "serveis";
      const nom_pendent = pendents.length === 1 ? "pendent" : "pendents";
      p.innerHTML = "<strong>+ " + pendents.length + " " + nom_serveis + " d'aquest àmbit, " + nom_pendent + " d'elaborar:</strong> " + pendents.map(sv => sv.nom).join(", ");
      list.appendChild(p);
    }
    det.appendChild(list);
    app.appendChild(det);
  });
}

staticText();
renderEntrada();
setupMunicipiSearch();
setupTopLinks();
setupControls();
updateVisibility();

// --- Ajust automàtic d'alçada quan la pàgina s'incrusta en un iframe (p. ex. a Liferay) ---
function sendHeightToParent() {
  try {
    window.parent.postMessage({ type: "casm-obligatorietats-resize", height: document.documentElement.scrollHeight }, "*");
  } catch (e) {}
}
let resizeTimer = null;
function scheduleSendHeight() {
  if (resizeTimer) clearTimeout(resizeTimer);
  resizeTimer = setTimeout(sendHeightToParent, 50);
}
new MutationObserver(scheduleSendHeight).observe(document.body, { childList: true, subtree: true, attributes: true });
window.addEventListener("load", sendHeightToParent);
window.addEventListener("resize", sendHeightToParent);
sendHeightToParent();
</script>
